name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate version
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Validate tag version
        id: version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          cargo_version="$(
            cargo metadata --locked --no-deps --format-version 1 \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "porthole"))'
          )"

          if [ "${tag_version}" != "${cargo_version}" ]; then
            echo "Tag ${tag} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: validate

    env:
      TARGET: x86_64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${TARGET}"

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-${{ env.TARGET }}

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target "${TARGET}"

      - name: Package release artifact
        run: |
          set -euo pipefail

          tag="${{ needs.validate.outputs.tag }}"
          asset_base="porthole-${tag}-${TARGET}"

          mkdir -p dist "${asset_base}/config" "${asset_base}/systemd"
          install -m 0755 "target/${TARGET}/release/porthole" "${asset_base}/porthole"
          install -m 0644 README.md "${asset_base}/README.md"
          install -m 0644 config/*.example.toml "${asset_base}/config/"
          install -m 0644 porthole.service "${asset_base}/systemd/porthole.service"

          tar -czf "dist/${asset_base}.tar.gz" "${asset_base}"
          (
            cd dist
            sha256sum "${asset_base}.tar.gz" > "${asset_base}.tar.gz.sha256"
          )

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: dist/*
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: validate

    env:
      TARGET: x86_64-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust builds
        uses: Swatinem/rust-cache@v2
        with:
          key: release-windows-${{ env.TARGET }}
          workspaces: |
            . -> target

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release

      - name: Package release artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $tag = "${{ needs.validate.outputs.tag }}"
          $assetBase = "porthole-$tag-$env:TARGET"
          $archive = "dist\$assetBase.zip"
          $checksum = "$archive.sha256"

          New-Item -ItemType Directory -Force -Path "dist", $assetBase, "$assetBase\config", "$assetBase\systemd" | Out-Null
          Copy-Item "target\release\porthole.exe" "$assetBase\porthole.exe"
          Copy-Item "README.md" "$assetBase\README.md"
          Copy-Item "config\*.example.toml" "$assetBase\config"
          Copy-Item "porthole.service" "$assetBase\systemd\porthole.service"

          Compress-Archive -Path $assetBase -DestinationPath $archive -Force

          $hash = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          "$hash  $assetBase.zip" | Set-Content -NoNewline -Encoding ascii $checksum

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: dist/*
          if-no-files-found: error

  publish-container:
    name: Publish Container
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.validate.outputs.tag }}
            type=semver,pattern={{version}},value=${{ needs.validate.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate.outputs.tag }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-linux
      - build-windows
      - publish-container

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          mapfile -t assets < <(find dist -type f | sort)

          gh release create "${{ needs.validate.outputs.tag }}" \
            "${assets[@]}" \
            --title "${{ needs.validate.outputs.tag }}" \
            --notes "Release ${{ needs.validate.outputs.tag }}" \
            --verify-tag \
            --latest
