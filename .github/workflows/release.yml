name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${TARGET}"

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Validate tag version
        id: version
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          cargo_version="$(
            cargo metadata --locked --no-deps --format-version 1 \
              | python3 -c 'import json, sys; data = json.load(sys.stdin); print(next(pkg["version"] for pkg in data["packages"] if pkg["name"] == "porthole"))'
          )"

          if [ "${tag_version}" != "${cargo_version}" ]; then
            echo "Tag ${tag} does not match Cargo.toml version ${cargo_version}" >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --target "${TARGET}"

      - name: Package release artifact
        id: package
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          asset_base="porthole-${tag}-${TARGET}"

          mkdir -p dist "${asset_base}"
          install -m 0755 "target/${TARGET}/release/porthole" "${asset_base}/porthole"

          tar -czf "dist/${asset_base}.tar.gz" "${asset_base}"
          (
            cd dist
            sha256sum "${asset_base}.tar.gz" > "${asset_base}.tar.gz.sha256"
          )

          echo "archive=dist/${asset_base}.tar.gz" >> "${GITHUB_OUTPUT}"
          echo "checksum=dist/${asset_base}.tar.gz.sha256" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.package.outputs.archive }}" \
            "${{ steps.package.outputs.checksum }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Release ${{ steps.version.outputs.tag }}" \
            --verify-tag \
            --latest
