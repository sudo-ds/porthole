# porthole client configuration (runs on the machine behind NAT).
# CLI flags override these; --tunnel specs on the command line are appended.

server_addr = "your.droplet.example.com:7835"

# Optional public host/IP to show for tunnel endpoints in the dashboard and web UI.
# Use this when server_addr is a private control address, such as a Tailscale IP.
# public_addr = "10xdev.sk"

# Pin the server's certificate fingerprint (the server prints it at startup).
server_fingerprint = "sha256:REPLACE_WITH_SERVER_FINGERPRINT"

# Local web UI (loopback only — do not expose this).
web_bind = "127.0.0.1:4040"

# Temporarily pause all tunnels without changing each tunnel's enabled state.
tunnels_paused = false

# Shared secret. Prefer PORTHOLE_SECRET / --secret-file; uncomment to set inline.
# secret = "CHANGE_ME"   # must match the server

# Logging. By default, porthole writes dashboard/console output and daily
# rotated files under ./Logs, keeping the newest 14 files. RUST_LOG or -v/-vv
# override level.
[logging]
mode = "both"       # both | console | file | off
level = "info"
directory = "Logs"
max_files = 14      # 0 disables pruning

# Each tunnel exposes a local service on a public port of the server.
# protocol can be "tcp", "udp", or "both"; "both" binds TCP and UDP to the same public port.
# remote_port is optional (omit or 0 => the server assigns one).
# local_ports is optional; use "4000-6000" for an inclusive contiguous range or
# "1000,2000" for a sparse list. The first local_ports entry must match local_addr's port.
# encrypted defaults to false for the data channel. Set true to wrap data in TLS.
# UDP-capable tunnels can set udp_mtu (default 1200, range 256-65507) for plaintext fragmentation.
# Experimental: UDP-capable loopback tunnels can set udp_source_pool to make distinct
# Internet UDP peers appear as distinct synthetic 127.x.x.x source IPs to local services.
[[tunnels]]
name = "minecraft"
protocol = "tcp"
local_addr = "127.0.0.1:25565"
remote_port = 25565
encrypted = false
# Optional TCP-only source IP forwarding for services that support PROXY protocol.
# Not available when protocol is "udp" or "both".
# proxy_protocol = "v1"   # off | v1 | v2

[[tunnels]]
name = "valheim"
protocol = "udp"
local_addr = "127.0.0.1:2456"
remote_port = 2456
enabled = true
encrypted = false
udp_mtu = 1200
# udp_source_pool = "127.64.0.0/16"

# Multi-port tunnel example. With remote_port omitted, the relay allocates the first
# available public block of the same size.
