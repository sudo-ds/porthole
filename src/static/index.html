<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>porthole</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#0b0e0b;
    --bg-soft:#101510;
    --surface:#151a15;
    --surface-2:#1a211b;
    --field:#0d110d;
    --line:#2b352d;
    --line-strong:#3d4a40;
    --fg:#eef3eb;
    --muted:#9aa794;
    --muted-2:#738070;
    --up:#63d471;
    --down:#f27979;
    --accent:#9ccf9f;
    --accent-strong:#c5e8c4;
    --link:#9dbdf8;
    --warn:#e8b464;
    --tcp:#85b9ff;
    --udp:#c9a7ff;
    --both:#9edda9;
  }
  * { box-sizing: border-box; }
  html { min-height:100%; background:var(--bg); }
  body {
    margin:0;
    min-height:100%;
    background:
      linear-gradient(180deg, rgba(156,207,159,0.05), transparent 260px),
      linear-gradient(180deg, var(--bg-soft), var(--bg) 48%);
    color:var(--fg);
    font:14px/1.5 "Aptos", "IBM Plex Sans", "Segoe UI", sans-serif;
  }
  [hidden] { display:none !important; }
  header {
    display:flex;
    align-items:center;
    gap:18px;
    min-height:72px;
    padding:18px clamp(18px, 4vw, 44px);
    border-bottom:1px solid var(--line);
    background:rgba(11,14,11,0.88);
    backdrop-filter:blur(12px);
  }
  .brand { display:flex; align-items:center; gap:12px; min-width:0; }
  header h1 { font-size:20px; line-height:1; margin:0; letter-spacing:0.04em; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; flex:0 0 auto; }
  .up { background:var(--up); box-shadow:0 0 0 4px rgba(99,212,113,0.12); }
  .down { background:var(--down); box-shadow:0 0 0 4px rgba(242,121,121,0.12); }
  .meta {
    display:flex;
    gap:18px;
    margin-left:auto;
    color:var(--muted);
    font:12px/1.4 "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
    text-align:right;
  }
  .meta span { color:var(--fg); }
  main {
    width:min(1520px, calc(100% - 24px));
    margin:0 auto;
    padding:36px 0 56px;
  }
  h2 {
    margin:0;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .toolbar {
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:16px;
    margin-bottom:16px;
  }
  .state { display:flex; align-items:center; gap:10px; min-width:0; }
  .table-wrap {
    overflow-x:auto;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
  }
  table {
    width:100%;
    min-width:1280px;
    table-layout:fixed;
    border-collapse:separate;
    border-spacing:0;
  }
  col.name-col { width:10%; }
  col.proto-col { width:25%; }
  col.local-col { width:14%; }
  col.public-col { width:14%; }
  col.metric-col { width:5.5%; }
  col.conns-col { width:5%; }
  col.diag-col { width:7%; }
  col.actions-col { width:14%; }
  th, td { text-align:left; }
  th {
    padding:14px 14px 12px;
    color:var(--muted);
    font-size:11px;
    font-weight:700;
    letter-spacing:0.07em;
    text-transform:uppercase;
    white-space:nowrap;
  }
  td {
    padding:18px 14px;
    border-top:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr { transition:background 140ms ease; }
  tbody tr:hover { background:rgba(156,207,159,0.035); }
  .name-cell { display:flex; align-items:center; gap:12px; min-width:0; white-space:nowrap; }
  .name-cell strong { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:15px; font-weight:700; }
  .proto-cell { display:flex; align-items:center; gap:7px; flex-wrap:nowrap; min-width:0; }
  .endpoint {
    font:13px/1.45 "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
    color:var(--fg);
    white-space:nowrap;
  }
  td.public { min-width:220px; }
  td.public a { color:var(--link); text-decoration:none; }
  td.public a:hover { text-decoration:underline; text-underline-offset:3px; }
  td.public .public-endpoint { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .metric {
    min-width:72px;
    text-align:right;
    font:13px/1.45 "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .diag {
    min-width:140px;
    font:12px/1.35 "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .diag-cell { display:flex; flex-direction:column; gap:2px; }
  .diag-sub { color:var(--muted); font-size:11px; }
  .muted-mono { color:var(--muted-2); font:13px/1.45 "JetBrains Mono", "Cascadia Mono", Consolas, monospace; }
  td.actions { width:176px; }
  .action-buttons { display:grid; grid-template-columns:80px 80px; gap:8px; align-items:center; }
  .action-buttons button { width:100%; text-align:center; }
  .pill {
    display:inline-flex;
    align-items:center;
    min-height:24px;
    padding:2px 9px;
    border-radius:999px;
    border:1px solid var(--line-strong);
    color:var(--muted);
    background:rgba(255,255,255,0.02);
    font:11px/1.2 "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
    white-space:nowrap;
  }
  .paused { color:var(--warn); border-color:rgba(232,180,100,0.55); }
  .err { color:var(--down); font-size:12px; }
  .hint { color:var(--muted-2); font-weight:500; }
  .tcp { color:var(--tcp); } .udp { color:var(--udp); } .both { color:var(--both); }
  .proxy-badge { color:var(--warn); border-color:rgba(232,180,100,0.48); }
  .encrypt-badge { color:var(--accent-strong); border-color:rgba(156,207,159,0.5); }
  .plain-badge { color:var(--warn); border-color:rgba(232,180,100,0.48); }
  .mtu-badge { color:var(--tcp); border-color:rgba(133,185,255,0.45); }
  .source-badge { color:var(--udp); border-color:rgba(201,167,255,0.45); }
  button {
    min-height:36px;
    background:var(--surface);
    color:var(--fg);
    border:1px solid var(--line-strong);
    border-radius:8px;
    padding:7px 12px;
    cursor:pointer;
    font:600 13px/1.2 "Aptos", "IBM Plex Sans", "Segoe UI", sans-serif;
    transition:border-color 140ms ease, background 140ms ease, color 140ms ease, transform 140ms ease;
  }
  button:hover { border-color:var(--accent); background:var(--surface-2); }
  button:active { transform:translateY(1px); }
  button.copy-btn {
    min-height:28px;
    padding:4px 9px;
    font-size:12px;
    color:var(--muted);
  }
  button.copy-btn:disabled { color:var(--up); border-color:var(--up); cursor:default; }
  button.danger:hover { border-color:var(--down); color:var(--down); }
  button.primary {
    min-width:96px;
    color:#071007;
    background:var(--accent);
    border-color:var(--accent);
  }
  button.primary:hover { background:var(--accent-strong); border-color:var(--accent-strong); }
  .add-section { margin-top:32px; }
  form {
    display:grid;
    grid-template-columns:minmax(160px,1.2fr) minmax(92px,0.6fr) minmax(120px,0.8fr) minmax(104px,0.65fr) minmax(240px,1.8fr) minmax(160px,1fr) minmax(112px,0.75fr) minmax(96px,0.5fr);
    grid-template-areas:
      "name proto encryption mtu local remote proxy submit"
      "sourcepool sourcepool sourcepool sourcepool sourcepool sourcepool sourcepool sourcepool";
    gap:14px 12px;
    align-items:end;
    margin-top:12px;
    padding:18px;
    border:1px solid var(--line);
    border-radius:8px;
    background:linear-gradient(180deg, rgba(255,255,255,0.035), rgba(255,255,255,0.018)), var(--surface);
  }
  label {
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width:0;
    color:var(--muted);
    font-size:12px;
    font-weight:600;
  }
  .label-row {
    display:flex;
    align-items:baseline;
    gap:6px;
    min-width:0;
    white-space:nowrap;
  }
  input, select {
    width:100%;
    height:36px;
    min-width:0;
    background:var(--field);
    color:var(--fg);
    border:1px solid var(--line-strong);
    border-radius:8px;
    padding:7px 10px;
    font:13px/1.2 "JetBrains Mono", "Cascadia Mono", Consolas, monospace;
  }
  input:focus, select:focus, button:focus-visible {
    outline:2px solid rgba(156,207,159,0.38);
    outline-offset:2px;
  }
  .field-name { grid-area:name; }
  .field-proto { grid-area:proto; }
  .field-encryption { grid-area:encryption; }
  .field-mtu { grid-area:mtu; }
  .field-source-pool { grid-area:sourcepool; }
  .field-local { grid-area:local; }
  .field-remote { grid-area:remote; }
  .field-proxy { grid-area:proxy; }
  .field-submit { grid-area:submit; }
  .empty { color:var(--muted); padding:18px 0; }
  @media (max-width: 980px) {
    main { width:min(100% - 24px, 760px); padding-top:24px; }
    header { align-items:flex-start; flex-wrap:wrap; }
    .meta { width:100%; margin-left:21px; justify-content:flex-start; text-align:left; }
    .table-wrap { overflow:visible; border:0; }
    table, thead, tbody, tr, td { display:block; min-width:0; width:100%; }
    colgroup { display:none; }
    thead { display:none; }
    tbody tr {
      margin-bottom:12px;
      padding:14px 16px;
      border:1px solid var(--line);
      border-radius:8px;
      background:var(--surface);
    }
    td {
      display:grid;
      grid-template-columns:112px minmax(0,1fr);
      gap:12px;
      align-items:center;
      padding:8px 0;
      border:0;
    }
    td::before {
      content:attr(data-label);
      color:var(--muted);
      font-size:11px;
      font-weight:700;
      letter-spacing:0.07em;
      text-transform:uppercase;
    }
    .metric { width:100%; text-align:left; }
    .action-buttons { grid-template-columns:1fr 1fr; }
    form {
      grid-template-columns:repeat(2, minmax(0, 1fr));
      grid-template-areas:none;
    }
    form label, form button[type="submit"] { grid-area:auto; }
    form button[type="submit"] { grid-column:1 / -1; }
  }
  @media (max-width: 560px) {
    body { font-size:13px; }
    main { width:min(100% - 20px, 480px); }
    .toolbar { align-items:flex-start; flex-direction:column; }
    #pauseBtn { width:100%; }
    td { grid-template-columns:1fr; gap:5px; }
    .endpoint { white-space:normal; overflow-wrap:anywhere; }
    .proto-cell { flex-wrap:wrap; }
    .name-cell strong { white-space:normal; overflow-wrap:anywhere; }
    form { grid-template-columns:1fr; padding:14px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span id="conn" class="dot down"></span>
    <h1>porthole</h1>
  </div>
  <div class="meta">
    <div>server: <span id="server">—</span></div>
    <div>uptime: <span id="uptime">—</span></div>
  </div>
</header>
<main>
  <div class="toolbar">
    <div class="state">
      <h2>Tunnels</h2>
      <span id="pauseState" class="pill">running</span>
    </div>
    <button id="pauseBtn" type="button">Pause all</button>
  </div>
  <div class="table-wrap">
    <table aria-label="Tunnels">
      <colgroup>
        <col class="name-col">
        <col class="proto-col">
        <col class="local-col">
        <col class="public-col">
        <col class="metric-col">
        <col class="metric-col">
        <col class="conns-col">
        <col class="diag-col">
        <col class="actions-col">
      </colgroup>
      <thead><tr>
        <th>Name</th><th>Proto</th><th>Local</th><th>Public</th>
        <th>In</th><th>Out</th><th>Conns</th><th>Diag</th><th></th>
      </tr></thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div id="empty" class="empty" hidden>No tunnels yet — add one below.</div>

  <section class="add-section" aria-labelledby="add-title">
    <h2 id="add-title">Add tunnel</h2>
    <form id="add">
      <label class="field-name">Name<input name="name" placeholder="minecraft" required></label>
      <label class="field-proto">Proto<select id="protoSelect" name="proto"><option>tcp</option><option>udp</option><option>both</option></select></label>
      <label class="field-encryption">Encryption<select name="encrypted"><option value="false">Plain</option><option value="true">TLS</option></select></label>
      <label id="mtuLabel" class="field-mtu">UDP MTU<input name="udp_mtu" type="number" min="256" max="65507" placeholder="1200"></label>
      <label id="poolLabel" class="field-source-pool">UDP source pool<input name="udp_source_pool" placeholder="127.64.0.0/16"></label>
      <label class="field-local">Local address<input name="local" placeholder="25565 or 127.0.0.1:25565" required></label>
      <label class="field-remote"><span class="label-row">Public port <small id="range" class="hint"></small></span><input name="remote_port" type="number" min="0" max="65535" placeholder="25565"></label>
      <label id="proxyLabel" class="field-proxy">Proxy<select name="proxy_protocol"><option value="off">Off</option><option value="v1">PROXY v1</option><option value="v2">PROXY v2</option></select></label>
      <button class="primary field-submit" type="submit">Add</button>
    </form>
  </section>
</main>
<script>
const fmtBytes = n => {
  const u = ['B','KB','MB','GB','TB']; let i = 0;
  while (n >= 1024 && i < u.length-1) { n /= 1024; i++; }
  return (i ? n.toFixed(1) : n) + ' ' + u[i];
};
const fmtDur = s => {
  const d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60);
  if (d) return `${d}d ${h}h`; if (h) return `${h}h ${m}m`; if (m) return `${m}m`; return `${s}s`;
};
const fmtMs = n => {
  if (n === null || n === undefined || !Number.isFinite(n)) return '--';
  if (n < 1) return `${Math.max(1, Math.round(n * 1000))} us`;
  if (n < 10) return `${n.toFixed(2)} ms`;
  if (n < 100) return `${n.toFixed(1)} ms`;
  return `${Math.round(n)} ms`;
};
const escapeHtml = value => String(value).replace(/[&<>"']/g, ch => ({
  '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
}[ch]));
function diagSummary(d) {
  if (!d || d.rtt_ms === null || d.rtt_ms === undefined) return '<span class="muted-mono">--</span>';
  const excess = d.excess_ms === null || d.excess_ms === undefined ? '' : `<span class="diag-sub">+${fmtMs(d.excess_ms)} excess</span>`;
  const relay = d.relay_overhead_ms === null || d.relay_overhead_ms === undefined ? '' : `<span class="diag-sub">sw ${fmtMs(d.relay_overhead_ms)}</span>`;
  return `<span class="diag-cell"><span>${fmtMs(d.rtt_ms)}</span>${excess}${relay}</span>`;
}
async function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
    return;
  }
  const area = document.createElement('textarea');
  area.value = text;
  area.setAttribute('readonly', '');
  area.style.position = 'fixed';
  area.style.top = '-1000px';
  document.body.appendChild(area);
  area.select();
  document.execCommand('copy');
  area.remove();
}
async function refresh() {
  let st;
  try { st = await (await fetch('/api/status')).json(); }
  catch { document.getElementById('conn').className = 'dot down'; return; }
  document.getElementById('conn').className = 'dot ' + (st.connected ? 'up' : 'down');
  document.getElementById('server').textContent = st.server;
  document.getElementById('uptime').textContent = fmtDur(st.uptime_secs);
  document.getElementById('range').textContent = st.max_port ? `(allowed ${st.min_port}-${st.max_port})` : '';
  const pauseState = document.getElementById('pauseState');
  pauseState.textContent = st.paused ? 'paused' : 'running';
  pauseState.className = 'pill' + (st.paused ? ' paused' : '');
  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.textContent = st.paused ? 'Unpause all' : 'Pause all';
  pauseBtn.dataset.paused = st.paused ? '1' : '0';
  const rows = document.getElementById('rows');
  rows.innerHTML = '';
  document.getElementById('empty').hidden = st.tunnels.length > 0;
  for (const t of st.tunnels) {
    const tr = document.createElement('tr');
    const live = t.up && t.enabled && !st.paused;
    const state = st.paused && t.enabled ? 'paused' : t.enabled ? (live ? 'live' : 'down') : 'disabled';
    const dot = `<span class="dot ${live ? 'up':'down'}" title="${state}"></span>`;
    const name = escapeHtml(t.name);
    const local = escapeHtml(t.local);
    const proto = ['tcp', 'udp', 'both'].includes(t.proto) ? t.proto : '';
    const protoText = escapeHtml(t.proto);
    const publicText = t.public ? escapeHtml(t.public) : '';
    const pub = st.paused && t.enabled ? '<span class="pill paused">paused</span>'
              : !t.enabled ? '<span class="pill">disabled</span>'
              : t.error ? `<span class="err" title="${escapeHtml(t.error)}">${escapeHtml(t.error)}</span>`
              : t.public ? `<span class="public-endpoint"><a class="endpoint" href="//${publicText}">${publicText}</a><button type="button" class="copy-btn" data-copy="${publicText}" title="Copy public address">copy</button></span>`
              : '<span class="pill">pending</span>';
    const hasUdp = t.proto === 'udp' || t.proto === 'both';
    const proxyBadge = t.proto === 'tcp' && t.proxy_protocol && t.proxy_protocol !== 'off'
      ? `<span class="pill proxy-badge">PROXY ${escapeHtml(t.proxy_protocol)}</span>`
      : '';
    const encryptionBadge = t.encrypted
      ? '<span class="pill encrypt-badge">tls</span>'
      : '<span class="pill plain-badge">plain</span>';
    const mtuBadge = hasUdp && t.udp_mtu
      ? `<span class="pill mtu-badge">mtu ${escapeHtml(t.udp_mtu)}</span>`
      : '';
    const sourcePoolBadge = hasUdp && t.udp_source_pool
      ? `<span class="pill source-badge">pool ${escapeHtml(t.udp_source_pool)}</span>`
      : '';
    const en = t.enabled ? 'disable' : 'enable';
    tr.innerHTML =
      `<td data-label="Name"><span class="name-cell">${dot}<strong>${name}</strong></span></td>` +
      `<td data-label="Proto" class="${proto}"><span class="proto-cell">${protoText}${encryptionBadge}${mtuBadge}${sourcePoolBadge}${proxyBadge}</span></td>` +
      `<td data-label="Local"><span class="endpoint">${local}</span></td>` +
      `<td data-label="Public" class="public">${pub}</td>` +
      `<td data-label="In" class="metric">${fmtBytes(t.bytes_in)}</td>` +
      `<td data-label="Out" class="metric">${fmtBytes(t.bytes_out)}</td>` +
      `<td data-label="Conns" class="metric">${escapeHtml(t.active)}</td>` +
      `<td data-label="Diag" class="diag">${diagSummary(t.diagnostics)}</td>` +
      `<td data-label="Actions" class="actions"><span class="action-buttons"><button data-toggle="${name}">${en}</button>` +
      `<button class="danger" data-remove="${name}">remove</button></span></td>`;
    rows.appendChild(tr);
  }
}
document.getElementById('rows').addEventListener('click', async e => {
  const copyBtn = e.target.closest('[data-copy]');
  if (copyBtn) {
    await copyText(copyBtn.dataset.copy);
    copyBtn.textContent = 'copied';
    copyBtn.disabled = true;
    setTimeout(() => {
      copyBtn.textContent = 'copy';
      copyBtn.disabled = false;
    }, 1000);
    return;
  }
  const tg = e.target.getAttribute('data-toggle');
  const rm = e.target.getAttribute('data-remove');
  if (tg) await fetch(`/api/tunnels/${encodeURIComponent(tg)}/toggle`, {method:'POST'});
  if (rm) await fetch(`/api/tunnels/${encodeURIComponent(rm)}`, {method:'DELETE'});
  if (tg || rm) refresh();
});
document.getElementById('pauseBtn').addEventListener('click', async e => {
  const paused = e.target.dataset.paused === '1';
  await fetch(paused ? '/api/tunnels/unpause' : '/api/tunnels/pause', {method:'POST'});
  refresh();
});
function syncProxyControl() {
  const proto = document.getElementById('protoSelect').value;
  const label = document.getElementById('proxyLabel');
  const select = label.querySelector('select');
  const mtuLabel = document.getElementById('mtuLabel');
  const mtuInput = mtuLabel.querySelector('input');
  const poolLabel = document.getElementById('poolLabel');
  const poolInput = poolLabel.querySelector('input');
  const tcp = proto === 'tcp';
  const hasUdp = proto === 'udp' || proto === 'both';
  label.hidden = !tcp;
  select.disabled = !tcp;
  if (!tcp) select.value = 'off';
  mtuLabel.hidden = !hasUdp;
  mtuInput.disabled = !hasUdp;
  if (!hasUdp) mtuInput.value = '';
  poolLabel.hidden = !hasUdp;
  poolInput.disabled = !hasUdp;
  if (!hasUdp) poolInput.value = '';
}
document.getElementById('protoSelect').addEventListener('change', syncProxyControl);
document.getElementById('add').addEventListener('submit', async e => {
  e.preventDefault();
  const f = new FormData(e.target);
  const body = { name: f.get('name'), proto: f.get('proto'), local: f.get('local') };
  body.encrypted = f.get('encrypted') === 'true';
  const rp = f.get('remote_port');
  if (rp) body.remote_port = parseInt(rp, 10);
  const mtu = f.get('udp_mtu');
  if (mtu) body.udp_mtu = parseInt(mtu, 10);
  const pool = f.get('udp_source_pool');
  if (pool) body.udp_source_pool = pool;
  const pp = f.get('proxy_protocol');
  if (pp && pp !== 'off') body.proxy_protocol = pp;
  const res = await fetch('/api/tunnels', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if (res.ok) { e.target.reset(); syncProxyControl(); refresh(); }
  else alert(await res.text());
});
syncProxyControl();
refresh();
setInterval(refresh, 1500);
</script>
